name: Android CI & Pages Deploy

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
    - name: Restore Keystore & Environment Files
      run: |
        base64 -d debug.keystore.base64 > debug.keystore
        cp .env.example .env
    - name: Build with Gradle
      run: gradle assembleDebug
      
    - name: Copy APK to docs
      run: |
        mkdir -p docs/downloads
        cp app/build/outputs/apk/debug/app-debug.apk docs/downloads/loracon-latest.apk

    - name: Deploy to GitHub Pages
      if: success()
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs
