name: Android CI & Pages Deploy

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
    - name: Restore Keystore & Environment Files
      run: |
        if [ -f debug.keystore.base64 ]; then
          base64 -d debug.keystore.base64 > debug.keystore
        else
          echo "debug.keystore.base64 not found, generating a new debug keystore..."
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        fi
        if [ -f .env.example ]; then
          cp .env.example .env
        else
          touch .env
        fi
    - name: Build with Gradle
      run: gradle assembleDebug --no-configuration-cache
      
    - name: Prepare Dual-Support Docs Staging
      run: |
        # 1. Create standard docs directory locally
        mkdir -p docs/downloads
        cp app/build/outputs/apk/debug/app-debug.apk docs/downloads/loracon-latest.apk
        touch docs/.nojekyll

        # 2. Set up the staging directory
        mkdir -p staging/docs/downloads
        
        # 3. Copy files for Root '/' Pages settings
        cp docs/index.html staging/
        cp docs/downloads/loracon-latest.apk staging/downloads/
        touch staging/.nojekyll

        # 4. Copy files for Nested '/docs' Pages settings
        cp docs/index.html staging/docs/
        cp docs/downloads/loracon-latest.apk staging/docs/downloads/
        touch staging/docs/.nojekyll

    - name: Deploy to GitHub Pages
      if: success()
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./staging
