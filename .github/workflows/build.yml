name: LoraCon CI Verification

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  web-admin-build:
    name: Web Admin Panel Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'web_admin_panel/frontend/package-lock.json'
          
      - name: Install Dependencies
        run: |
          cd web_admin_panel/frontend
          npm install
          
      - name: Lint Verification
        run: |
          cd web_admin_panel/frontend
          npm run lint || true # Allow lint warnings but log them
          
      - name: Production Build (Vite)
        run: |
          cd web_admin_panel/frontend
          npm run build

  android-verify:
    name: Android Client Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'
          
      - name: Grant Execute Permission
        run: chmod +x gradlew
        
      - name: Build with Gradle
        run: ./gradlew assembleDebug
